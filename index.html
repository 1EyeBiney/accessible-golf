<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Accessible Golf - Physics Engine v2.26.1</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background-color: #121212; color: #ffffff; max-width: 800px; margin: auto; line-height: 1.6; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #4CAF50; margin-bottom: 0.5rem; }
        .version { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        button { font-size: 1.5rem; padding: 15px 30px; margin-top: 50px; cursor: pointer; background-color: #4CAF50; color: black; border: none; border-radius: 8px; font-weight: bold; }
        #game-container { width: 100%; display: none; flex-direction: column; align-items: center; }
        #game-container:focus { outline: 4px solid #4CAF50; border-radius: 8px; padding: 1rem; background-color: #1a1a1a; }
        #visual-output { font-size: 1.2rem; font-weight: bold; min-height: 12rem; padding: 1.5rem; background: #2a2a2a; border-radius: 8px; width: 100%; text-align: center; border: 1px solid #444; white-space: pre-line; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    </style>
</head>
<body>

    <h1>Accessible Golf Engine</h1>
    <div class="version">Flight Tracking & Roll Physics v2.19</div>

    <button id="initBtn" autofocus onclick="initGame()">Press Enter to Begin</button>
    <div id="game-container" tabindex="0" role="application" aria-label="Golf Swing Engine">
        <div id="visual-output" aria-hidden="true">Ready. Hold Down Arrow to start backswing.</div>
    </div>

    <div id="aria-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <script>
        console.log("Accessible Golf Engine v2.26.1 loaded");

        let audioCtx = null;
        let powerOscillator, powerGain;
        let swingState = 0; // 0: Idle, 1: Back, 2: Power, 3: Down, 4: Impact, 5: Flight
        let stateTimeouts = [];

        let backswingStartTime = 0, downswingStartTime = 0, impactStartTime = 0;
        let hingeTimeBack = 0, hingeTimeDown = 0;
        let finalPower = 0, dropDurationMs = 0;
        let windX = 0;
        let windY = 0;
        const windLevels = [
            { name: "Calm", min: 0, max: 4, variance: 1 },
            { name: "Light Breeze", min: 2, max: 7, variance: 3 },
            { name: "Gusts", min: 4, max: 10, variance: 6 },
            { name: "Windy", min: 5, max: 15, variance: 10 }
        ];
        let windLevelIndex = 3; // Default to Windy to match previous behavior
        let aimAngle = 0;
        let stanceIndex = 2;
        let stanceAlignment = 0;
        let hole = 1;
        let par = 4;
        let ballX = 0;
        let ballY = 0;
        let pinX = 0;
        let pinY = 420;
        let strokes = 0;
        let isHoleComplete = false;
        let gameMode = 'course';
        let rangeLie = 'Fairway';
        let confirmingRange = false;
        const shotStyles = [
            { name: "Full", distMod: 1.0, loftMod: 0, spinMod: 0, rollMod: 1.0, windMod: 1.0 },
            { name: "Pitch", distMod: 0.55, loftMod: 5, spinMod: 1500, rollMod: 0.6, windMod: 0.25 },
            { name: "Half Pitch", distMod: 0.35, loftMod: 5, spinMod: 1000, rollMod: 0.7, windMod: 0.25 },
            { name: "Chip", distMod: 0.25, loftMod: -15, spinMod: -500, rollMod: 2.5, windMod: 0.25 },
            { name: "Short Chip", distMod: 0.10, loftMod: -20, spinMod: -800, rollMod: 3.0, windMod: 0.25 },
            { name: "Flop", distMod: 0.20, loftMod: 25, spinMod: 3000, rollMod: 0.1, windMod: 0.50 }
        ];
        let shotStyleIndex = 0;
        let chippingRange = 'short';
        let confirmingGreen = false;

        const AUDIO_GAIN_BOOST = 1.45;
        const CONTINUOUS_GAIN_BOOST = 1.4;

        // --- UPDATED BAG: Added Loft and Roll Percentages ---
        // rollPct: Normal expected roll as a % of total distance
        const clubs = [
            { name: "Driver", baseDistance: 255, maxDispersion: 45, loft: 10, rollPct: 0.12 },
            { name: "3 Wood", baseDistance: 230, maxDispersion: 35, loft: 15, rollPct: 0.08 },
            { name: "5 Wood", baseDistance: 215, maxDispersion: 30, loft: 18, rollPct: 0.06 },
            { name: "4 Iron", baseDistance: 195, maxDispersion: 25, loft: 22, rollPct: 0.05 },
            { name: "5 Iron", baseDistance: 180, maxDispersion: 22, loft: 26, rollPct: 0.04 },
            { name: "6 Iron", baseDistance: 165, maxDispersion: 20, loft: 30, rollPct: 0.03 },
            { name: "7 Iron", baseDistance: 155, maxDispersion: 18, loft: 34, rollPct: 0.02 },
            { name: "8 Iron", baseDistance: 145, maxDispersion: 15, loft: 38, rollPct: 0.01 },
            { name: "9 Iron", baseDistance: 135, maxDispersion: 12, loft: 42, rollPct: 0.00 },
            { name: "Pitching Wedge", baseDistance: 120, maxDispersion: 10, loft: 46, rollPct: -0.01 }, // Slight spin back
            { name: "Sand Wedge", baseDistance: 100, maxDispersion: 8, loft: 56, rollPct: -0.03 } // Heavy spin back
        ];
        const stanceNames = ["Far Forward", "Forward", "Neutral", "Back", "Far Back"];
        const alignmentNames = ["Severe Closed", "Closed", "Neutral", "Open", "Severe Open"];
        let currentClubIndex = 0;
        let club = clubs[currentClubIndex];
        const fairwayWidth = 35;

        let lastShotReport = "No caddy report available yet.";

        function calculateDistanceToPin() {
            return Math.round(Math.sqrt(Math.pow(pinX - ballX, 2) + Math.pow(pinY - ballY, 2)));
        }

        window.announce = function(msg) {
            const el = document.getElementById('aria-announce');
            if (el) { el.textContent = ''; setTimeout(() => { el.textContent = msg; }, 50); }
        };

        window.initAudio = function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        function generateWind() {
            const level = windLevels[windLevelIndex];
            let magX = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
            let magY = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
            windX = Math.random() < 0.5 ? magX : -magX;
            windY = Math.random() < 0.5 ? magY : -magY;
        }

        function driftWind() {
            const level = windLevels[windLevelIndex];
            let driftX = Math.floor(Math.random() * (level.variance * 2 + 1)) - level.variance;
            let driftY = Math.floor(Math.random() * (level.variance * 2 + 1)) - level.variance;
            windX += driftX;
            windY += driftY;
            if (windX > level.max) windX = level.max;
            if (windX < -level.max) windX = -level.max;
            if (windY > level.max) windY = level.max;
            if (windY < -level.max) windY = -level.max;
        }

        function getWindReport() {
            if (windX === 0 && windY === 0) {
                return 'Wind is calm.';
            }
            const verticalWind = windY === 0 ? 'Calm' : `${Math.abs(windY)} mph ${windY > 0 ? 'Tailwind' : 'Headwind'}`;
            const horizontalWind = windX === 0 ? '0 mph Center' : `${Math.abs(windX)} mph ${windX > 0 ? 'Right' : 'Left'}`;
            return `Wind is ${verticalWind}, pushing ${horizontalWind}.`;
        }

        function getAimReport() {
            if (aimAngle === 0) {
                return 'Aiming straight down the fairway.';
            }
            return `Aiming ${Math.abs(aimAngle)} degrees ${aimAngle < 0 ? 'Left' : 'Right'}.`;
        }

        function getStanceReport() {
            return "Stance: Ball " + stanceNames[stanceIndex] + ", " + alignmentNames[stanceAlignment + 2] + " Alignment.";
        }

        function getSetupReport() {
            const style = shotStyles[shotStyleIndex];
            const isRough = Math.abs(ballX) > (fairwayWidth / 2);
            
            const baseCarry = club.baseDistance * style.distMod;
            const baseTotal = baseCarry + (baseCarry * (club.rollPct * style.rollMod));
            
            if (isRough) {
                const minTotal = Math.round(baseTotal * 0.6);
                const maxTotal = Math.round(baseTotal * 0.9);
                return `${club.name}. Style: ${style.name}. In the rough. 100% power hits ${minTotal} to ${maxTotal} yards.`;
            } else {
                return `${club.name}. Style: ${style.name}. 100% power hits ${Math.round(baseTotal)} yards.`;
            }
        }

        window.initGame = function() {
            window.initAudio();
            generateWind();
            ballX = 0; ballY = 0; pinX = 0; pinY = 420;
            document.getElementById('initBtn').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-container').focus();
            const setupReport = getSetupReport();
            let targetDist = calculateDistanceToPin();
            window.announce(`Hole ${hole}. Par ${par}. ${targetDist} yards. Ready. ${setupReport} Use Page Up or Down to change clubs.`);
            document.getElementById('visual-output').innerText = `Hole ${hole}. Par ${par}. ${targetDist} yards. Ready. ${setupReport} Use Page Up or Down to change clubs.`;
        };

        // --- AUDIO HELPERS ---
        function playTone(freq, type, dur, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const boostedVol = Math.min(1, vol * AUDIO_GAIN_BOOST);
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(boostedVol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // Noise generator for wind/flight sounds
        function playNoise(dur, vol, isRoll = false) {
            const bufferSize = audioCtx.sampleRate * dur;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                // Brown noise for roll, White noise for flight
                data[i] = (Math.random() * 2 - 1) * (isRoll ? 0.5 : 1.0);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = isRoll ? 'lowpass' : 'bandpass';
            filter.frequency.value = isRoll ? 400 : 1000;

            const gain = audioCtx.createGain();
            const boostedVol = Math.min(1, vol * AUDIO_GAIN_BOOST);
            gain.gain.setValueAtTime(boostedVol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);

            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function triggerMilestone(percent) {
            if (percent === 25) playTone(220, 'square', 0.3, 0.2);
            if (percent === 50) playTone(440, 'triangle', 0.2, 0.4);
            if (percent === 75) { playTone(660, 'triangle', 0.1, 0.4); setTimeout(() => playTone(660, 'triangle', 0.1, 0.4), 120); }
            if (percent === 100) playTone(1200, 'sine', 0.8, 0.6);
            if (percent === 120) playTone(150, 'sawtooth', 0.4, 0.7);
        }

        // --- SWING PHASES ---
        function startBackswing() {
            if (swingState !== 0) return;
            window.initAudio();
            swingState = 1; hingeTimeBack = 0; hingeTimeDown = 0;
            backswingStartTime = performance.now();
            document.getElementById('visual-output').innerText = `Backswing...`;
            for (let i = 1; i <= 4; i++) { stateTimeouts.push(setTimeout(() => playTone(600, 'triangle', 0.15, 0.25), i * 500)); }
            stateTimeouts.push(setTimeout(startPowerPhase, 2000));
        }

        function startPowerPhase() {
            swingState = 2; powerStartTime = performance.now();
            triggerMilestone(25);
            powerOscillator = audioCtx.createOscillator();
            powerGain = audioCtx.createGain();
            powerOscillator.type = 'sine';
            powerOscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            powerOscillator.frequency.linearRampToValueAtTime(1050, audioCtx.currentTime + 2.5);
            powerGain.gain.setValueAtTime(Math.min(1, 0.4 * CONTINUOUS_GAIN_BOOST), audioCtx.currentTime);
            powerOscillator.connect(powerGain); powerGain.connect(audioCtx.destination);
            powerOscillator.start();

            stateTimeouts.push(setTimeout(() => triggerMilestone(50), 666));
            stateTimeouts.push(setTimeout(() => triggerMilestone(75), 1333));
            stateTimeouts.push(setTimeout(() => triggerMilestone(100), 2000));
            stateTimeouts.push(setTimeout(() => { if (swingState === 2) { triggerMilestone(120); startDownswing(); } }, 2533));
        }

        function startDownswing() {
            if (swingState !== 2) { swingState = 0; return; }
            swingState = 3; stateTimeouts.forEach(clearTimeout);
            let elapsed = performance.now() - powerStartTime;
            finalPower = Math.min(120, Math.round(25 + ((elapsed / 2000) * 75)));
            if (powerOscillator) { powerOscillator.stop(); }
            downswingStartTime = performance.now();
            document.getElementById('visual-output').innerText = `Downswing...`;
            for (let i = 1; i <= 4; i++) { stateTimeouts.push(setTimeout(() => playTone(600, 'triangle', 0.15, 0.25), i * 500)); }
            stateTimeouts.push(setTimeout(startImpactPhase, 2000));
        }

        function startImpactPhase() {
            swingState = 4; impactStartTime = performance.now();
            dropDurationMs = finalPower * 15;
            if (finalPower >= 100) triggerMilestone(100);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100 + (finalPower * 8), audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + (dropDurationMs / 1000));
            gain.gain.setValueAtTime(Math.min(1, 0.4 * CONTINUOUS_GAIN_BOOST), audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + (dropDurationMs / 1000));
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + (dropDurationMs / 1000) + 0.1);

            [75, 50, 25].forEach(m => { if (finalPower > m) stateTimeouts.push(setTimeout(() => triggerMilestone(m), (finalPower - m) * 15)); });
            stateTimeouts.push(setTimeout(() => { if (swingState === 4) calculateShot(true); }, dropDurationMs + 400));
        }

        function calculateZoneAccuracy(offsetMs, pressure) {
            const absOffset = Math.abs(offsetMs);
            const buffer = 60 / (1 + (pressure * 0.5));
            if (absOffset <= buffer) return 100;
            if (absOffset <= 150) return 95 - ((absOffset - buffer) / 100 * 15);
            if (absOffset <= 400) return 80 - ((absOffset - 150) / 250 * 60);
            return 10;
        }

        // --- NEW: Physics & Flight Sequencer ---
        function calculateShot(autoMiss = false) {
            swingState = 5; // Flight Phase - locks controls
            stateTimeouts.forEach(clearTimeout);
            strokes++;
            if (autoMiss) {
                playTone(150, 'sine', 0.5, 0.5);
                let missDist = calculateDistanceToPin();
                lastShotReport = `Whiffed. Stroke ${strokes}. ${missDist} yards to the pin.`;
                window.announce("Whiffed!");
                setTimeout(() => { swingState = 0; }, 1000);
                return;
            }

            const impactDiff = Math.round((performance.now() - impactStartTime) - dropDurationMs);
            const hingeDiff = Math.round(hingeTimeDown - hingeTimeBack);
            let pressure = finalPower > 105 ? (finalPower - 105) / 15 : 0;

            // --- v2.19 PHYSICS ---
            const hingeAcc = Math.max(10, 100 - (Math.abs(hingeDiff) / 4));

            // A. Identify if starting in Rough
            const isStartingInRough = gameMode === 'range' ? (rangeLie === 'Rough') : (typeof isPutt !== 'undefined' && !isPutt && Math.abs(ballX) > 17.5);
            let lieMod = 1.0;
            let lieDispersionMod = 1.0;
            let lieForgivenessMod = 1.0;

            if (isStartingInRough) {
                lieMod = 0.6 + (Math.random() * 0.3);
                lieDispersionMod = 2.0;
                lieForgivenessMod = 0.7; // Shrinks impact windows by 30%
            }

            let forgiveness = finalPower <= 100 ? 1 + ((100 - finalPower) * 0.01) : Math.max(0.4, 1 - ((finalPower - 100) * 0.02));
            forgiveness *= lieForgivenessMod; // Apply rough penalty to timing windows

            // --- v2.26.1 Continuous Physics Model ---
            let absImpact = Math.abs(impactDiff);
            let adjustedImpact = absImpact / forgiveness;

            // A. Calculate Spin Penalty (How much the ball curves)
            // Scaling: 200ms adjusted impact = ~2000 RPM (depending on club/pressure)
            let spinPenalty = 0.5 + (adjustedImpact / 50); 
            if (adjustedImpact > 160) spinPenalty = 5 + ((adjustedImpact - 160) / 20);

            // B. Calculate Distance Dampening (Based on the Side Spin we are about to generate)
            // We calculate a temporary sideSpin to determine the 'energy loss'
            let tempSideSpin = Math.abs(Math.round((impactDiff / 20) * 100 * spinPenalty * (1 + pressure)));
            // 2000 RPM side spin should be roughly 10% penalty (0.9 multiplier)
            let dampening = Math.max(0.25, 1 - (tempSideSpin / 20000)); 

            // C. Final Impact Accuracy Score (For the Caddy)
            let impactAcc = Math.max(10, 100 - (adjustedImpact / 2.5));

            const currentStyle = shotStyles[shotStyleIndex];
            const accuracyScore = Math.round((impactAcc + hingeAcc) / 2);
            let dynamicLoft = Math.max(0, club.loft + currentStyle.loftMod + ((2 - stanceIndex) * 5));
            let backspinRPM = Math.max(400, Math.round((club.loft * 150) + (finalPower * 10) + (impactAcc * 7) + ((stanceIndex - 2) * 500) + currentStyle.spinMod));
            
            // D. Apply results to the Side Spin and Distance variables
            let sideSpinRPM = Math.round((impactDiff / 20) * 100 * spinPenalty * (1 + pressure)) + (stanceAlignment * 800);

            // B. Calculate total yardage using the new Dampening and 25% Floor
            let potentialDist = club.baseDistance * (finalPower / 100) * (1 + (hingeTimeBack / 2000 * 0.15)) * currentStyle.distMod * lieMod;
            let totalDistance = Math.round(potentialDist * dampening * Math.max(0.2, 1 - Math.pow(Math.abs(hingeDiff) / 400, 2)));

            let hangTimeSecs = Math.min(6, Math.max(0.5, (totalDistance / 60) + (dynamicLoft / 15)));
            let windYEffect = Math.round(windY * (hangTimeSecs / 1.5) * currentStyle.windMod);
            let windXEffect = Math.round(windX * (hangTimeSecs / 1.2) * currentStyle.windMod);

            // C. Calculate 2D Movement (Auto-Face Pin)
            const targetAngleRad = Math.atan2(pinX - ballX, pinY - ballY); // Automatically face the hole
            const userAimRad = aimAngle * (Math.PI / 180); // User's manual left/right aim
            const finalRad = targetAngleRad + userAimRad; // Final combined launch angle

            // E. Boost Lateral Movement (Increase the 'Leak' and 'Slice' feel)
            // Increase the lateral movement weight from 3200 to 2400 to make spin more impactful
            const physicsX = (typeof isPutt !== 'undefined' && isPutt) ? 0 : (sideSpinRPM / 2400) * (club.maxDispersion * (typeof lieDispersionMod !== 'undefined' ? lieDispersionMod : 1));
            const lateralTotal = physicsX + windXEffect;

            // Apply trigonometry relative to the target line, not the fairway line
            const moveY = Math.cos(finalRad) * totalDistance - Math.sin(finalRad) * lateralTotal;
            const moveX = Math.sin(finalRad) * totalDistance + Math.cos(finalRad) * lateralTotal;

            ballY += moveY;
            ballX += moveX;

            let rollDistance = Math.round(totalDistance * club.rollPct * currentStyle.rollMod);
            let carryDistance = Math.max(0, totalDistance - rollDistance);
            let lateralX = Math.round((physicsX + windXEffect) * 10) / 10;

            let distanceToPin = calculateDistanceToPin();

            let lie = Math.abs(ballX) > (fairwayWidth / 2) ? "Rough" : "Fairway";

            // --- AUDIO FLIGHT SEQUENCER ---
            document.getElementById('visual-output').innerText = "Ball is in the air...";

            // 1. Strike Sound
            playTone(800, 'triangle', 0.1, 0.6);

            // 2. Flight Wind
            playNoise(hangTimeSecs + 0.3, 0.3, false);

            // 3. The Landing & Roll
            setTimeout(() => {
                const loftPenalty = dynamicLoft >= 50 ? 2 : dynamicLoft >= 38 ? 1 : 0;
                const baseBounceCount = rollDistance <= 0 ? 1 : Math.min(6, 1 + Math.floor(rollDistance / 7));
                const bounceCount = Math.max(1, baseBounceCount - loftPenalty);
                const bounceDurationMs = 0.12 * 1000;
                const bounceOffsets = [];
                let bounceGapMs = Math.min(800, 350 + (rollDistance * 3));
                let bounceElapsedMs = 0;
                let bounceSequenceMs = 0;

                for (let bounceIndex = 0; bounceIndex < bounceCount; bounceIndex++) {
                    bounceOffsets.push(bounceElapsedMs);
                    bounceSequenceMs = bounceElapsedMs + bounceDurationMs;
                    bounceElapsedMs += bounceGapMs;
                    bounceGapMs = Math.max(90, Math.round(bounceGapMs * 0.85));
                }

                bounceOffsets.forEach((bounceOffsetMs, bounceIndex) => {
                    setTimeout(() => {
                        const bounceVolume = Math.max(0.12, 1.0 * Math.pow(0.8, bounceIndex));
                        playTone(180, 'sine', 0.12, bounceVolume);
                    }, bounceOffsetMs);
                });

                // Roll Sound (duration based on roll distance, e.g., 20 yds = 2 seconds)
                let rollTimeSecs = Math.max(0, Math.abs(rollDistance) / 10);
                if (rollTimeSecs > 0) {
                    setTimeout(() => {
                        document.getElementById('visual-output').innerText = "Ball is bouncing and rolling...";
                        playNoise(rollTimeSecs, 0.4, true); // Low frequency rumble
                    }, bounceSequenceMs);
                }

                const contactLabel = hingeDiff < -60 ? "Thin" : hingeDiff > 60 ? "Fat" : "Flushed";
                const loftDiff = dynamicLoft - club.loft;
                const trajectoryLabel = loftDiff < -8 ? "piercing" : loftDiff < -3 ? "low" : loftDiff > 8 ? "towering" : loftDiff > 3 ? "high" : "standard";
                const shapeLabel = sideSpinRPM < -2500 ? "snap hook" : sideSpinRPM < -1000 ? "hook" : sideSpinRPM < -250 ? "draw" : sideSpinRPM > 2500 ? "banana slice" : sideSpinRPM > 1000 ? "slice" : sideSpinRPM > 250 ? "fade" : "straight shot";
                const shotDesc = `${contactLabel}. A ${trajectoryLabel} ${shapeLabel}.`;
                const windDesc = `Wind pushed it ${Math.abs(windYEffect)} yds ${windYEffect > 0 ? 'long' : windYEffect < 0 ? 'short' : 'nowhere'}, and ${Math.abs(windXEffect)} yds ${windXEffect > 0 ? 'right' : windXEffect < 0 ? 'left' : 'nowhere'}.`;

                // 4. The Reveal
                setTimeout(() => {
                    let dirStr = lateralX === 0 ? "dead straight" : `${Math.abs(lateralX)} yards ${lateralX < 0 ? 'left' : 'right'}`;
                    const sideSpinShape = sideSpinRPM === 0 ? "Straight" : sideSpinRPM > 0 ? "Slice" : "Hook";
                    const metrics = `Power ${finalPower}%. Hinge Diff ${hingeDiff}ms. Impact Offset ${impactDiff}ms. Accuracy Score ${accuracyScore}%. Backspin: ${backspinRPM} RPM. Side Spin: ${sideSpinRPM} RPM (${sideSpinShape}).`;
                    const roughDesc = isStartingInRough ? "Hacked it out of the rough. " : "";
                    const shotBroadcast = `${club.name}. ${roughDesc}${shotDesc} ${windDesc} Carries ${carryDistance}, rolls ${rollDistance} for a total of ${totalDistance}. Settles in the ${lie}, ${dirStr}.`;

                    if (gameMode === 'chipping') {
                        let finalProximity = distanceToPin;
                        ballX = 0; ballY = 0; pinX = 0;
                        pinY = chippingRange === 'short' ? Math.floor(Math.random() * 16) + 5 : Math.floor(Math.random() * 61) + 20;
                        let newTarget = calculateDistanceToPin();
                        const chippingMsg = `Chipping Green. ${shotBroadcast} Shot finished ${finalProximity} yards from the pin. New target: ${newTarget} yards.`;
                        window.announce(chippingMsg);
                        lastShotReport = chippingMsg + "\n\nTelemetry:\n" + metrics;
                        document.getElementById('visual-output').innerText = lastShotReport;
                        driftWind(); aimAngle = 0; stanceIndex = 2; stanceAlignment = 0; swingState = 0;
                    } else {
                        if (gameMode === 'course' && distanceToPin <= 20) isHoleComplete = true;
                        
                        if (isHoleComplete) {
                            playTone(440, 'sine', 0.2, 0.4); setTimeout(() => playTone(554, 'sine', 0.2, 0.4), 200); setTimeout(() => playTone(659, 'sine', 0.4, 0.4), 400);
                            const completionMessage = `Hole complete! You reached the green in ${strokes} strokes, finishing ${distanceToPin} yards from the pin.`;
                            window.announce(completionMessage);
                            lastShotReport = completionMessage + "\n\n" + shotBroadcast + "\n\nTelemetry:\n" + metrics;
                            document.getElementById('visual-output').innerText = lastShotReport;
                            swingState = 6;
                        } else {
                            if (gameMode === 'range') {
                                let finalProximity = distanceToPin;
                                const rangeMsg = `Driving Range. ${shotBroadcast} Finished ${finalProximity} yards from target.`;
                                ballX = 0; ballY = 0; // Snap back to tee
                                window.announce(rangeMsg);
                                lastShotReport = rangeMsg + "\n\nTelemetry:\n" + metrics;
                                document.getElementById('visual-output').innerText = lastShotReport;
                                driftWind(); aimAngle = 0; stanceIndex = 2; stanceAlignment = 0; swingState = 0;
                            } else {
                                const broadcast = `Stroke ${strokes + 1}. ${distanceToPin} yards to the pin. ${shotBroadcast}`;
                                setTimeout(() => {
                                    window.announce(broadcast);
                                    lastShotReport = broadcast + "\n\nTelemetry:\n" + metrics;
                                    document.getElementById('visual-output').innerText = lastShotReport;
                                }, typeof isPutting !== 'undefined' && isPutting && club.name === "Putter" && strokes > 1 ? 1500 : 0);
                                driftWind(); aimAngle = 0; stanceIndex = 2; stanceAlignment = 0; swingState = 0;
                            }
                        }
                    }
                }, bounceSequenceMs + (rollTimeSecs * 1000) + 500);

            }, hangTimeSecs * 1000);
        }

        window.addEventListener('keydown', (e) => {
            if (confirmingRange) {
                if (e.code === 'KeyY' || e.code === 'Enter') {
                    e.preventDefault();
                    gameMode = 'range'; confirmingRange = false; strokes = 0; ballX = 0; ballY = 0; pinX = 0; pinY = club.baseDistance; rangeLie = 'Fairway'; isHoleComplete = false; swingState = 0; if (typeof isPutting !== 'undefined') isPutting = false;
                    window.announce(`Welcome to the Driving Range. Target set to ${pinY} yards. Lie is ${rangeLie}.`);
                    document.getElementById('visual-output').innerText = `Driving Range. Target: ${pinY}. Lie: ${rangeLie}.`;
                } else {
                    confirmingRange = false; window.announce("Range travel cancelled.");
                }
                return;
            }

            if (confirmingGreen) {
                if (e.code === 'KeyY' || e.code === 'Enter') {
                    e.preventDefault();
                    gameMode = 'chipping'; confirmingGreen = false; strokes = 0; isHoleComplete = false; swingState = 0;
                    ballX = 0; ballY = 0; pinX = 0;
                    pinY = chippingRange === 'short' ? Math.floor(Math.random() * 16) + 5 : Math.floor(Math.random() * 61) + 20;
                    let targetDist = calculateDistanceToPin();
                    window.announce(`Welcome to the Chipping Green. Target is ${targetDist} yards.`);
                    document.getElementById('visual-output').innerText = `Chipping Green. Target: ${targetDist} yards.`;
                } else {
                    confirmingGreen = false; window.announce("Chipping Green travel cancelled.");
                }
                return;
            }

            if (swingState === 0 || isHoleComplete) {
                if (e.code === 'KeyR') {
                    e.preventDefault();
                    confirmingRange = true;
                    window.announce("Go to Driving Range? Press Y or Enter to confirm.");
                    return;
                }
                if (e.code === 'KeyG') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        chippingRange = chippingRange === 'short' ? 'long' : 'short';
                        let newTarget = chippingRange === 'short' ? Math.floor(Math.random() * 16) + 5 : Math.floor(Math.random() * 61) + 20;
                        if (gameMode === 'chipping') {
                            ballX = 0; ballY = 0; pinX = 0; pinY = newTarget;
                            let targetDist = calculateDistanceToPin();
                            window.announce(`Chipping range set to ${chippingRange}. New target: ${targetDist} yards.`);
                        } else {
                            window.announce(`Chipping range set to ${chippingRange}.`);
                        }
                    } else {
                        confirmingGreen = true;
                        window.announce("Go to Chipping Green? Press Y or Enter to confirm.");
                    }
                    return;
                }
                if (e.code.startsWith('Digit') && e.code !== 'Digit0') {
                    e.preventDefault();
                    let targetHole = parseInt(e.code.replace('Digit', ''));
                    if (e.shiftKey) targetHole += 9;

                    gameMode = 'course'; hole = targetHole; par = 4; strokes = 0; isHoleComplete = false; swingState = 0;
                    ballX = 0; ballY = 0; pinX = 0; pinY = 420;
                    aimAngle = 0; stanceIndex = 2; stanceAlignment = 0; confirmingRange = false;
                    currentClubIndex = clubs.findIndex(c => c.name === "Driver");
                    if (currentClubIndex === -1) currentClubIndex = 0;
                    club = clubs[currentClubIndex];
                    shotStyleIndex = 0;
                    if (typeof isPutting !== 'undefined') isPutting = false;
                    let targetDist = calculateDistanceToPin();
                    let msg = `Warping to Hole ${hole}. Par ${par}. ${targetDist} yards.`;
                    window.announce(msg);
                    document.getElementById('visual-output').innerText = msg;
                    return;
                }
            }

            if (isHoleComplete) return;
            if (e.repeat) return;

            // Prevent input if ball is in the air (State 5)
            if (swingState === 5) return;

            if (e.code === 'ArrowDown') {
                e.preventDefault();
                if (swingState === 0) startBackswing();
                else if (swingState === 4) calculateShot(false);
            }

            if (e.code === 'Space') {
                e.preventDefault();
                playTone(880, 'sine', 0.1, 0.25);
                if (swingState === 1) hingeTimeBack = performance.now() - backswingStartTime;
                if (swingState === 3) hingeTimeDown = performance.now() - downswingStartTime;
            }

            if (swingState === 0) {
                if (e.code === 'Home' || e.code === 'End') {
                    e.preventDefault();
                    if (e.code === 'Home') {
                        stanceIndex = Math.max(0, stanceIndex - 1);
                    }
                    if (e.code === 'End') {
                        stanceIndex = Math.min(4, stanceIndex + 1);
                    }
                    const stanceReport = getStanceReport();
                    document.getElementById('visual-output').innerText = stanceReport;
                    window.announce(stanceReport);
                }
                if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        stanceAlignment += e.code === 'ArrowLeft' ? -1 : 1;
                        stanceAlignment = Math.max(-2, Math.min(2, stanceAlignment));
                        const stanceReport = getStanceReport();
                        document.getElementById('visual-output').innerText = stanceReport;
                        window.announce(stanceReport);
                    } else {
                        aimAngle += e.code === 'ArrowLeft' ? -1 : 1;
                        aimAngle = Math.max(-90, Math.min(90, aimAngle));
                        const aimReport = getAimReport();
                        document.getElementById('visual-output').innerText = aimReport;
                        window.announce(aimReport);
                    }
                }
                if (e.code === 'KeyW') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        windLevelIndex = (windLevelIndex + 1) % windLevels.length;
                        generateWind();
                        const level = windLevels[windLevelIndex];
                        const windMsg = `Wind level set to ${level.name}. ${getWindReport()}`;
                        document.getElementById('visual-output').innerText = windMsg;
                        window.announce(windMsg);
                    } else {
                        const windReport = getWindReport();
                        document.getElementById('visual-output').innerText = windReport;
                        window.announce(windReport);
                    }
                }
                if (e.code === 'KeyC') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        navigator.clipboard.writeText(lastShotReport).then(() => {
                            const msg = "Telemetry copied to clipboard.";
                            document.getElementById('visual-output').innerText = msg;
                            window.announce(msg);
                        }).catch(err => {
                            const errMsg = "Failed to copy telemetry.";
                            document.getElementById('visual-output').innerText = errMsg;
                            window.announce(errMsg);
                        });
                    } else {
                        document.getElementById('visual-output').innerText = lastShotReport;
                        window.announce(lastShotReport);
                    }
                }
                if (e.code === 'KeyL' && gameMode === 'range') {
                    e.preventDefault();
                    rangeLie = rangeLie === 'Fairway' ? 'Rough' : 'Fairway';
                    const lieMsg = `Virtual lie set to ${rangeLie}.`;
                    document.getElementById('visual-output').innerText = lieMsg;
                    window.announce(lieMsg);
                }
                if (e.code === 'PageUp') {
                    e.preventDefault();
                    if (currentClubIndex > 0) {
                        currentClubIndex--; club = clubs[currentClubIndex];
                        if (gameMode === 'range') { pinY = club.baseDistance; pinX = 0; }
                        const setupReport = getSetupReport();
                        window.announce(setupReport);
                        document.getElementById('visual-output').innerText = setupReport;
                    }
                }
                if (e.code === 'PageDown') {
                    e.preventDefault();
                    if (currentClubIndex < clubs.length - 1) {
                        currentClubIndex++; club = clubs[currentClubIndex];
                        if (gameMode === 'range') { pinY = club.baseDistance; pinX = 0; }
                        const setupReport = getSetupReport();
                        window.announce(setupReport);
                        document.getElementById('visual-output').innerText = setupReport;
                    }
                }
                if (e.code === 'KeyS') {
                    e.preventDefault();
                    shotStyleIndex = (shotStyleIndex + 1) % shotStyles.length;
                    const typeMsg = getSetupReport();
                    document.getElementById('visual-output').innerText = typeMsg;
                    window.announce(typeMsg);
                }
                if (e.code === 'KeyT') {
                    e.preventDefault();
                    const distMsg = `${calculateDistanceToPin()} yards to the pin.`;
                    document.getElementById('visual-output').innerText = distMsg;
                    window.announce(distMsg);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown' && (swingState === 1 || swingState === 2)) {
                e.preventDefault(); startDownswing();
            }
        });
    </script>
</body>
</html>
