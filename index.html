<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Golf Engine (v6.01.0)</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background-color: #121212; color: #ffffff; max-width: 800px; margin: auto; line-height: 1.6; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #4CAF50; margin-bottom: 0.5rem; }
        .version { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        button { font-size: 1.5rem; padding: 15px 30px; margin-top: 50px; cursor: pointer; background-color: #4CAF50; color: black; border: none; border-radius: 8px; font-weight: bold; }
        #game-container { width: 100%; display: none; flex-direction: column; align-items: center; }
        #game-container:focus { outline: 4px solid #4CAF50; border-radius: 8px; padding: 1rem; background-color: #1a1a1a; }
        #visual-output { font-size: 1.2rem; font-weight: bold; min-height: 12rem; padding: 1.5rem; background: #2a2a2a; border-radius: 8px; width: 100%; text-align: center; border: 1px solid #444; white-space: pre-line; }
        .marquee-container { width: 100%; overflow: visible; background: #000; border: 1px solid #4CAF50; border-radius: 4px; padding: 15px; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .marquee-text { display: inline-block; color: #4CAF50; font-family: monospace; font-size: 1.1rem; white-space: normal; animation: none; padding-left: 0; }
        #caddy-panel { width: 100%; background: #1a1a1a; border-left: 5px solid #4CAF50; padding: 15px; margin-bottom: 15px; display: none; box-sizing: border-box; text-align: left; }
        #caddy-panel h3 { margin: 0 0 10px 0; color: #4CAF50; text-transform: uppercase; font-size: 1rem; letter-spacing: 2px; }
        #caddy-panel p { margin: 0; color: #ddd; font-size: 1.1rem; white-space: pre-line; }
        #dashboard-panel { width: 100%; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .dash-box { background: #1a1a1a; border: 1px solid #444; border-radius: 4px; padding: 10px; text-align: center; }
        .dash-label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .dash-value { color: #4CAF50; font-size: 1.05rem; font-weight: bold; white-space: pre-line; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    </style>
</head>
<body role="application">

    <h1>Accessible Golf Engine</h1>
    <div class="version">Modular Codebase v5.31.2</div>

    <button id="initBtn" autofocus onclick="initGame()">Press Enter to Begin</button>
    <div id="game-container" tabindex="0" aria-label="Golf Swing Engine">
        
        <div id="hud-top" style="display: none; width: 100%;">
            <div class="marquee-container" aria-hidden="true">
                <div id="marquee-text" class="marquee-text">System Initialized. Awaiting Telemetry...</div>
            </div>
            <div id="caddy-panel" aria-hidden="true">
                <h3>Post-Shot Caddy Report</h3>
                <p id="caddy-panel-text"></p>
            </div>
        </div>

        <div id="dashboard-panel" aria-hidden="true">
            <div class="dash-box"><span class="dash-label">Target Info</span><span id="dash-hole" class="dash-value">--</span></div>
            <div class="dash-box"><span class="dash-label">Environment</span><span id="dash-env" class="dash-value">--</span></div>
            <div class="dash-box"><span class="dash-label">Equipment</span><span id="dash-club" class="dash-value">--</span></div>
            <div class="dash-box"><span class="dash-label">Setup & Aim</span><span id="dash-setup" class="dash-value">--</span></div>
        </div>

        <div id="visual-output" aria-hidden="true">Ready. Hold Down Arrow to start backswing.</div>
        <div id="scorecard-container" aria-hidden="true" style="display: none; width: 100%; background: #1a1a1a; padding: 1rem; border-radius: 8px; border: 1px solid #4CAF50;"></div>
        <div id="help-panel" aria-hidden="true" style="display: none; width: 100%; max-height: 70vh; overflow-y: auto; background: #1a1a1a; padding: 2rem; border-radius: 8px; border: 2px solid #2196F3; margin-top: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
        <canvas id="swing-meter" width="800" height="120" aria-hidden="true" style="margin-top: 1rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); background: #111; display: none;"></canvas>
    </div>

    <div id="aria-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <script src="data_ag.js?v=5.61.0"></script>
    <script src="courses/course_holodeck.js?v=5.61.0"></script>
    <script src="courses/course_scrapyard.js?v=5.61.0"></script>
    <script src="courses/course_pebble.js?v=5.61.0"></script>
    <script src="courses/course_pasture.js?v=5.61.0"></script>
    <script src="audio_core.js?v=5.61.0"></script>
    <script src="golf_audio_bank.js?v=5.61.0"></script>
    <script src="physics_core.js?v=5.61.0"></script>
    <script src="physics_collisions.js?v=5.61.0"></script>
    <script src="ui_ag.js?v=5.61.0"></script>
    <script src="input_ag.js?v=5.61.0"></script>
    <script src="main_ag.js?v=5.61.0"></script>
</body>
</html>
