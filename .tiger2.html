<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Woods: Bark-Bark-Snarl Audition</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 2rem;
            max-width: 650px;
            margin: auto;
        }
        h1 { color: #4CAF50; }
        button {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #2a2a2a;
            color: #4CAF50;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
        }
        button:focus, button:hover {
            background-color: #4CAF50;
            color: #121212;
            outline: 2px solid #ffffff;
        }
        .desc { font-weight: normal; font-size: 0.9rem; color: #aaa; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>Bot Woods: The Triple-Beat Signature</h1>
    <p>Use Tab or Arrow keys to navigate. Press Enter/Space to trigger.</p>

    <button onclick="playCombo(1)" aria-label="Play Option 1: High Start Snarl">
        Option 1: The High-Start Baseline
        <span class="desc">Bark -> Bark -> Snarl. The snarl simply starts at a very high pitch (280Hz) and drops.</span>
    </button>
    
    <button onclick="playCombo(2)" aria-label="Play Option 2: The Apex Rise">
        Option 2: The Apex Rise (Your Request)
        <span class="desc">The snarl starts at 120Hz, rises to 300Hz at the 20% mark, then drops to 40Hz.</span>
    </button>

    <button onclick="playCombo(3)" aria-label="Play Option 3: The Fast-Paced Apex">
        Option 3: The Fast-Paced Apex
        <span class="desc">Shorter barks, less gap time. The snarl rises even higher (350Hz) and peaks faster (15% mark).</span>
    </button>

    <button onclick="playCombo(4)" aria-label="Play Option 4: The Late Swell">
        Option 4: The Late Swell
        <span class="desc">The pitch rise takes much longer, not peaking until the 40% mark, creating a "winding up" feel.</span>
    </button>

    <button onclick="playCombo(5)" aria-label="Play Option 5: The Cyber-Apex">
        Option 5: The Cyber-Apex
        <span class="desc">Uses the Option 2 timing, but swaps the biological Sawtooth wave for a synthetic Square wave.</span>
    </button>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // A modular factory that builds one "piece" of the roar based on a timeline
        function createSegment(startTime, duration, waveType, freqs, lfos, filters) {
            // 1. The Tone
            const osc = audioCtx.createOscillator();
            osc.type = waveType;
            osc.frequency.setValueAtTime(freqs[0].f, startTime);
            for(let i = 1; i < freqs.length; i++) {
                // Exponential ramps prevent audio clicking and sound more natural
                osc.frequency.exponentialRampToValueAtTime(freqs[i].f, startTime + (freqs[i].t * duration));
            }

            // 2. The Breath (Brown Noise)
            const bufferSize = audioCtx.sampleRate * duration;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(filters[0].f, startTime);
            for(let i = 1; i < filters.length; i++) {
                filter.frequency.linearRampToValueAtTime(filters[i].f, startTime + (filters[i].t * duration));
            }
            noise.connect(filter);

            // 3. The Tremolo (LFO Rumble)
            const lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.setValueAtTime(lfos[0].f, startTime);
            for(let i = 1; i < lfos.length; i++) {
                lfo.frequency.linearRampToValueAtTime(lfos[i].f, startTime + (lfos[i].t * duration));
            }
            const rumbleGain = audioCtx.createGain();
            rumbleGain.gain.value = 0.6; // Depth of the vibration
            lfo.connect(rumbleGain.gain);

            // 4. Master Volume Envelope (Attack, Hold, Release)
            const masterGain = audioCtx.createGain();
            const vol = 0.8;
            masterGain.gain.setValueAtTime(0.001, startTime);
            masterGain.gain.exponentialRampToValueAtTime(vol, startTime + (duration * 0.1));
            masterGain.gain.setValueAtTime(vol, startTime + (duration * 0.7));
            masterGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

            // Routing
            osc.connect(rumbleGain);
            filter.connect(rumbleGain);
            rumbleGain.connect(masterGain);
            masterGain.connect(audioCtx.destination);

            // Trigger
            lfo.start(startTime); lfo.stop(startTime + duration);
            osc.start(startTime); osc.stop(startTime + duration);
            noise.start(startTime); noise.stop(startTime + duration);
        }

        // The sequence manager
        function playCombo(type) {
            initAudio();
            const t0 = audioCtx.currentTime;

            // Base pacing variables
            let barkDur = 0.4;
            let barkGap = 0.1;
            let snarlDur = 0.9;

            if (type === 3) { barkDur = 0.3; barkGap = 0.05; } // Faster pacing for Option 3

            let t1 = t0 + barkDur + barkGap; // Time when Bark 2 starts
            let t2 = t1 + barkDur + barkGap; // Time when Snarl starts

            let waveType = type === 5 ? 'square' : 'sawtooth';

            // --- BARK 1 ---
            createSegment(t0, barkDur, waveType,
                [{t: 0, f: 150}, {t: 1, f: 60}],     // Pitch drops 150 -> 60
                [{t: 0, f: 25}, {t: 1, f: 15}],      // LFO flutter
                [{t: 0, f: 600}, {t: 1, f: 200}]     // Breath filter
            );

            // --- BARK 2 ---
            // Pitched slightly higher (160) to build tension
            createSegment(t1, barkDur, waveType,
                [{t: 0, f: 160}, {t: 1, f: 65}],
                [{t: 0, f: 25}, {t: 1, f: 15}],
                [{t: 0, f: 600}, {t: 1, f: 200}]
            );

            // --- THE FINAL SNARL ---
            let snarlFreqs;
            switch(type) {
                case 1:
                    // Baseline: Starts high (280) and drops
                    snarlFreqs = [{t: 0, f: 280}, {t: 1, f: 40}];
                    break;
                case 2:
                    // The Apex: Starts low (120), rises to 300 at 20% mark, drops to 40
                    snarlFreqs = [{t: 0, f: 120}, {t: 0.2, f: 300}, {t: 1, f: 40}];
                    break;
                case 3:
                    // Fast Apex: Rises higher (350) and faster (15% mark)
                    snarlFreqs = [{t: 0, f: 150}, {t: 0.15, f: 350}, {t: 1, f: 40}];
                    break;
                case 4:
                    // Late Swell: Rises slower, peaking at the 40% mark
                    snarlFreqs = [{t: 0, f: 100}, {t: 0.4, f: 250}, {t: 1, f: 30}];
                    break;
                case 5:
                    // Cyber-Cat: Same timing as Option 2, but Square wave
                    snarlFreqs = [{t: 0, f: 120}, {t: 0.2, f: 300}, {t: 1, f: 40}];
                    break;
            }

            createSegment(t2, snarlDur, waveType,
                snarlFreqs,
                [{t: 0, f: 30}, {t: 1, f: 12}],
                [{t: 0, f: 800}, {t: 1, f: 150}]
            );
        }
    </script>
</body>
</html>
