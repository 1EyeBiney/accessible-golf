<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Golf - Physics Engine v2.14.1</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background-color: #121212; color: #ffffff; max-width: 800px; margin: auto; line-height: 1.6; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #4CAF50; margin-bottom: 0.5rem; }
        .version { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        button { font-size: 1.5rem; padding: 15px 30px; margin-top: 50px; cursor: pointer; background-color: #4CAF50; color: black; border: none; border-radius: 8px; font-weight: bold; }
        #game-container { width: 100%; display: none; flex-direction: column; align-items: center; }
        #game-container:focus { outline: 4px solid #4CAF50; border-radius: 8px; padding: 1rem; background-color: #1a1a1a; }
        #visual-output { font-size: 1.2rem; font-weight: bold; min-height: 12rem; padding: 1.5rem; background: #2a2a2a; border-radius: 8px; width: 100%; text-align: center; border: 1px solid #444; white-space: pre-line; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    </style>
</head>
<body>

    <h1>Accessible Golf Engine</h1>
    <div class="version">Flight Tracking & Roll Physics v2.14.1</div>

    <button id="initBtn" autofocus onclick="initGame()">Press Enter to Begin</button>
    <div id="game-container" tabindex="0" role="application" aria-label="Golf Swing Engine">
        <div id="visual-output" aria-hidden="true">Ready. Hold Down Arrow to start backswing.</div>
    </div>

    <div id="aria-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <script>
        console.log("Accessible Golf Engine v2.14 loaded");

        let audioCtx = null;
        let powerOscillator, powerGain;
        let swingState = 0; // 0: Idle, 1: Back, 2: Power, 3: Down, 4: Impact, 5: Flight
        let stateTimeouts = [];

        let backswingStartTime = 0, downswingStartTime = 0, impactStartTime = 0;
        let hingeTimeBack = 0, hingeTimeDown = 0;
        let finalPower = 0, dropDurationMs = 0;
        let windX = 0;
        let windY = 0;
        let aimAngle = 0;
        let stanceIndex = 2;
        let stanceAlignment = 0;
        let hole = 1;
        let par = 4;
        let distanceToPin = 420;
        let strokes = 0;
        let isHoleComplete = false;
        let gameMode = 'course';
        let confirmingRange = false;

        const AUDIO_GAIN_BOOST = 1.45;
        const CONTINUOUS_GAIN_BOOST = 1.4;

        // --- UPDATED BAG: Added Loft and Roll Percentages ---
        // rollPct: Normal expected roll as a % of total distance
        const clubs = [
            { name: "Driver", baseDistance: 255, maxDispersion: 45, loft: 10, rollPct: 0.12 },
            { name: "3 Wood", baseDistance: 230, maxDispersion: 35, loft: 15, rollPct: 0.08 },
            { name: "5 Wood", baseDistance: 215, maxDispersion: 30, loft: 18, rollPct: 0.06 },
            { name: "4 Iron", baseDistance: 195, maxDispersion: 25, loft: 22, rollPct: 0.05 },
            { name: "5 Iron", baseDistance: 180, maxDispersion: 22, loft: 26, rollPct: 0.04 },
            { name: "6 Iron", baseDistance: 165, maxDispersion: 20, loft: 30, rollPct: 0.03 },
            { name: "7 Iron", baseDistance: 155, maxDispersion: 18, loft: 34, rollPct: 0.02 },
            { name: "8 Iron", baseDistance: 145, maxDispersion: 15, loft: 38, rollPct: 0.01 },
            { name: "9 Iron", baseDistance: 135, maxDispersion: 12, loft: 42, rollPct: 0.00 },
            { name: "Pitching Wedge", baseDistance: 120, maxDispersion: 10, loft: 46, rollPct: -0.01 }, // Slight spin back
            { name: "Sand Wedge", baseDistance: 100, maxDispersion: 8, loft: 56, rollPct: -0.03 } // Heavy spin back
        ];
        const stanceNames = ["Far Forward", "Forward", "Neutral", "Back", "Far Back"];
        const alignmentNames = ["Severe Closed", "Closed", "Neutral", "Open", "Severe Open"];
        let currentClubIndex = 0;
        let club = clubs[currentClubIndex];
        const fairwayWidth = 35;

        let lastShotReport = "No caddy report available yet.";

        window.announce = function(msg) {
            const el = document.getElementById('aria-announce');
            if (el) { el.textContent = ''; setTimeout(() => { el.textContent = msg; }, 50); }
        };

        window.initAudio = function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        function generateWind() {
            windX = Math.floor(Math.random() * 31) - 15;
            windY = Math.floor(Math.random() * 31) - 15;
        }

        function getWindReport() {
            if (windX === 0 && windY === 0) {
                return 'Wind is calm.';
            }
            const verticalWind = windY === 0 ? 'Calm' : `${Math.abs(windY)} mph ${windY > 0 ? 'Tailwind' : 'Headwind'}`;
            const horizontalWind = windX === 0 ? '0 mph Center' : `${Math.abs(windX)} mph ${windX > 0 ? 'Right' : 'Left'}`;
            return `Wind is ${verticalWind}, pushing ${horizontalWind}.`;
        }

        function getAimReport() {
            if (aimAngle === 0) {
                return 'Aiming straight down the fairway.';
            }
            return `Aiming ${Math.abs(aimAngle)} degrees ${aimAngle < 0 ? 'Left' : 'Right'}.`;
        }

        function getStanceReport() {
            return "Stance: Ball " + stanceNames[stanceIndex] + ", " + alignmentNames[stanceAlignment + 2] + " Alignment.";
        }

        window.initGame = function() {
            window.initAudio();
            generateWind();
            document.getElementById('initBtn').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-container').focus();
            window.announce(`Hole ${hole}. Par ${par}. ${distanceToPin} yards. Ready. ${club.name}. Use Page Up or Down to change clubs.`);
            document.getElementById('visual-output').innerText = `Hole ${hole}. Par ${par}. ${distanceToPin} yards. Ready. ${club.name}. Use Page Up or Down to change clubs.`;
        };

        // --- AUDIO HELPERS ---
        function playTone(freq, type, dur, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const boostedVol = Math.min(1, vol * AUDIO_GAIN_BOOST);
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(boostedVol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // Noise generator for wind/flight sounds
        function playNoise(dur, vol, isRoll = false) {
            const bufferSize = audioCtx.sampleRate * dur;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                // Brown noise for roll, White noise for flight
                data[i] = (Math.random() * 2 - 1) * (isRoll ? 0.5 : 1.0);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = isRoll ? 'lowpass' : 'bandpass';
            filter.frequency.value = isRoll ? 400 : 1000;

            const gain = audioCtx.createGain();
            const boostedVol = Math.min(1, vol * AUDIO_GAIN_BOOST);
            gain.gain.setValueAtTime(boostedVol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);

            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function triggerMilestone(percent) {
            if (percent === 25) playTone(220, 'square', 0.3, 0.2);
            if (percent === 50) playTone(440, 'triangle', 0.2, 0.4);
            if (percent === 75) { playTone(660, 'triangle', 0.1, 0.4); setTimeout(() => playTone(660, 'triangle', 0.1, 0.4), 120); }
            if (percent === 100) playTone(1200, 'sine', 0.8, 0.6);
            if (percent === 120) playTone(150, 'sawtooth', 0.4, 0.7);
        }

        // --- SWING PHASES ---
        function startBackswing() {
            if (swingState !== 0) return;
            window.initAudio();
            swingState = 1; hingeTimeBack = 0; hingeTimeDown = 0;
            backswingStartTime = performance.now();
            document.getElementById('visual-output').innerText = `Backswing...`;
            for (let i = 1; i <= 4; i++) { stateTimeouts.push(setTimeout(() => playTone(600, 'triangle', 0.15, 0.25), i * 500)); }
            stateTimeouts.push(setTimeout(startPowerPhase, 2000));
        }

        function startPowerPhase() {
            swingState = 2; powerStartTime = performance.now();
            triggerMilestone(25);
            powerOscillator = audioCtx.createOscillator();
            powerGain = audioCtx.createGain();
            powerOscillator.type = 'sine';
            powerOscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            powerOscillator.frequency.linearRampToValueAtTime(1050, audioCtx.currentTime + 2.5);
            powerGain.gain.setValueAtTime(Math.min(1, 0.4 * CONTINUOUS_GAIN_BOOST), audioCtx.currentTime);
            powerOscillator.connect(powerGain); powerGain.connect(audioCtx.destination);
            powerOscillator.start();

            stateTimeouts.push(setTimeout(() => triggerMilestone(50), 666));
            stateTimeouts.push(setTimeout(() => triggerMilestone(75), 1333));
            stateTimeouts.push(setTimeout(() => triggerMilestone(100), 2000));
            stateTimeouts.push(setTimeout(() => { if (swingState === 2) { triggerMilestone(120); startDownswing(); } }, 2533));
        }

        function startDownswing() {
            if (swingState !== 2) { swingState = 0; return; }
            swingState = 3; stateTimeouts.forEach(clearTimeout);
            let elapsed = performance.now() - powerStartTime;
            finalPower = Math.min(120, Math.round(25 + ((elapsed / 2000) * 75)));
            if (powerOscillator) { powerOscillator.stop(); }
            downswingStartTime = performance.now();
            document.getElementById('visual-output').innerText = `Downswing...`;
            for (let i = 1; i <= 4; i++) { stateTimeouts.push(setTimeout(() => playTone(600, 'triangle', 0.15, 0.25), i * 500)); }
            stateTimeouts.push(setTimeout(startImpactPhase, 2000));
        }

        function startImpactPhase() {
            swingState = 4; impactStartTime = performance.now();
            dropDurationMs = finalPower * 15;
            if (finalPower >= 100) triggerMilestone(100);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100 + (finalPower * 8), audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + (dropDurationMs / 1000));
            gain.gain.setValueAtTime(Math.min(1, 0.4 * CONTINUOUS_GAIN_BOOST), audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + (dropDurationMs / 1000));
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + (dropDurationMs / 1000) + 0.1);

            [75, 50, 25].forEach(m => { if (finalPower > m) stateTimeouts.push(setTimeout(() => triggerMilestone(m), (finalPower - m) * 15)); });
            stateTimeouts.push(setTimeout(() => { if (swingState === 4) calculateShot(true); }, dropDurationMs + 400));
        }

        function calculateZoneAccuracy(offsetMs, pressure) {
            const absOffset = Math.abs(offsetMs);
            const buffer = 60 / (1 + (pressure * 0.5));
            if (absOffset <= buffer) return 100;
            if (absOffset <= 150) return 95 - ((absOffset - buffer) / 100 * 15);
            if (absOffset <= 400) return 80 - ((absOffset - 150) / 250 * 60);
            return 10;
        }

        // --- NEW: Physics & Flight Sequencer ---
        function calculateShot(autoMiss = false) {
            swingState = 5; // Flight Phase - locks controls
            stateTimeouts.forEach(clearTimeout);
            strokes++;
            if (autoMiss) {
                playTone(150, 'sine', 0.5, 0.5);
                lastShotReport = `Whiffed. Stroke ${strokes}. ${distanceToPin} yards to the pin.`;
                window.announce("Whiffed!");
                setTimeout(() => { swingState = 0; }, 1000);
                return;
            }

            const impactDiff = Math.round((performance.now() - impactStartTime) - dropDurationMs);
            const hingeDiff = Math.round(hingeTimeDown - hingeTimeBack);
            let pressure = finalPower > 105 ? (finalPower - 105) / 15 : 0;

            // Base Math
            const impactAcc = Math.round(calculateZoneAccuracy(impactDiff, pressure));
            const hingeAcc = Math.round(calculateZoneAccuracy(hingeDiff, pressure));
            const accuracyScore = Math.round((impactAcc + hingeAcc) / 2);
            let smashFactor = impactAcc / 100;
            let hingeIntensity = 1 + (hingeTimeBack / 2000 * 0.15);

            const hingeThreshold = 400 / (1 + (pressure * 0.8));
            let contactMultiplier = 1 - Math.pow(Math.abs(hingeDiff) / hingeThreshold, 2);
            contactMultiplier = Math.max(0.2, contactMultiplier);

            let potentialDist = club.baseDistance * (finalPower / 100) * hingeIntensity;
            let totalDistance = Math.round(potentialDist * smashFactor * contactMultiplier);

            // --- TRAJECTORY, SPIN, CARRY, AND ROLL MATH ---
            let dynamicLoft = club.loft;
            let backspinRPM = Math.round((club.loft * 150) + (finalPower * 10) + (impactAcc * 7));
            let stanceLoftMod = (2 - stanceIndex) * 5;
            let stanceSpinMod = (stanceIndex - 2) * 500;

            dynamicLoft = Math.max(0, dynamicLoft + stanceLoftMod);
            backspinRPM += stanceSpinMod;

            if (hingeDiff < -60) { // Thin Shot (Low trajectory, hot roll)
                dynamicLoft -= 10;
                backspinRPM -= Math.abs(hingeDiff) * 22;
            } else if (hingeDiff > 60) { // Fat Shot (Pop up, dead roll)
                dynamicLoft += 10;
                backspinRPM += Math.abs(hingeDiff) * 12;
            }

            dynamicLoft = Math.max(0, dynamicLoft);
            backspinRPM += hingeDiff * 18;
            backspinRPM = Math.max(400, Math.round(backspinRPM * contactMultiplier));

            let sideSpinRPM = Math.round((impactDiff / 400) * 3200 * (1 + pressure));
            let alignmentSpinMod = stanceAlignment * 800;
            sideSpinRPM += alignmentSpinMod;

            // Hang time: Higher loft & higher distance = longer hang time (cap at ~6 secs)
            let hangTimeSecs = Math.max(0.5, (totalDistance / 60) + (dynamicLoft / 15));
            if (hangTimeSecs > 6) hangTimeSecs = 6;

            let windYEffect = Math.round(windY * (hangTimeSecs / 1.5));
            let windXEffect = Math.round(windX * (hangTimeSecs / 1.2));

            const spinRollAdjustment = (backspinRPM - 5200) / 550;
            let projectedRollDistance = Math.round((totalDistance * club.rollPct) - spinRollAdjustment);
            let carryDistance = Math.max(0, totalDistance - projectedRollDistance);
            carryDistance = Math.max(0, Math.round(carryDistance + windYEffect));

            const baseRollDistance = carryDistance * club.rollPct;
            let rollDistance = Math.round(baseRollDistance - spinRollAdjustment);
            totalDistance = carryDistance + rollDistance;
            if (gameMode === 'course') {
                distanceToPin = Math.abs(distanceToPin - Math.round(totalDistance));
            }

            // Lie & Dispersion
            let currentDispersion = club.maxDispersion * (1 + (pressure * 1.5));
            let lateralX = ((sideSpinRPM / 3200) * currentDispersion) + windXEffect;
            lateralX = Math.round(lateralX * 10) / 10;
            let aimOffset = Math.tan(aimAngle * (Math.PI / 180)) * totalDistance;
            lateralX = Math.round((lateralX + aimOffset) * 10) / 10;
            let lie = Math.abs(lateralX) > (fairwayWidth / 2) ? "Rough" : "Fairway";

            // --- AUDIO FLIGHT SEQUENCER ---
            document.getElementById('visual-output').innerText = "Ball is in the air...";

            // 1. Strike Sound
            playTone(800, 'triangle', 0.1, 0.6);

            // 2. Flight Wind
            playNoise(hangTimeSecs + 0.3, 0.3, false);

            // 3. The Landing & Roll
            setTimeout(() => {
                const loftPenalty = dynamicLoft >= 50 ? 2 : dynamicLoft >= 38 ? 1 : 0;
                const baseBounceCount = rollDistance <= 0 ? 1 : Math.min(6, 1 + Math.floor(rollDistance / 7));
                const bounceCount = Math.max(1, baseBounceCount - loftPenalty);
                const bounceDurationMs = 0.12 * 1000;
                const bounceOffsets = [];
                let bounceGapMs = Math.min(800, 350 + (rollDistance * 3));
                let bounceElapsedMs = 0;
                let bounceSequenceMs = 0;

                for (let bounceIndex = 0; bounceIndex < bounceCount; bounceIndex++) {
                    bounceOffsets.push(bounceElapsedMs);
                    bounceSequenceMs = bounceElapsedMs + bounceDurationMs;
                    bounceElapsedMs += bounceGapMs;
                    bounceGapMs = Math.max(90, Math.round(bounceGapMs * 0.85));
                }

                bounceOffsets.forEach((bounceOffsetMs, bounceIndex) => {
                    setTimeout(() => {
                        const bounceVolume = Math.max(0.12, 1.0 * Math.pow(0.8, bounceIndex));
                        playTone(180, 'sine', 0.12, bounceVolume);
                    }, bounceOffsetMs);
                });

                // Roll Sound (duration based on roll distance, e.g., 20 yds = 2 seconds)
                let rollTimeSecs = Math.max(0, Math.abs(rollDistance) / 10);
                if (rollTimeSecs > 0) {
                    setTimeout(() => {
                        document.getElementById('visual-output').innerText = "Ball is bouncing and rolling...";
                        playNoise(rollTimeSecs, 0.4, true); // Low frequency rumble
                    }, bounceSequenceMs);
                }

                const contactLabel = hingeDiff < -60 ? "Thin" : hingeDiff > 60 ? "Fat" : "Flushed";
                const loftDiff = dynamicLoft - club.loft;
                const trajectoryLabel = loftDiff < -8 ? "piercing" : loftDiff < -3 ? "low" : loftDiff > 8 ? "towering" : loftDiff > 3 ? "high" : "standard";
                const shapeLabel = sideSpinRPM < -2500 ? "snap hook" : sideSpinRPM < -1000 ? "hook" : sideSpinRPM < -250 ? "draw" : sideSpinRPM > 2500 ? "banana slice" : sideSpinRPM > 1000 ? "slice" : sideSpinRPM > 250 ? "fade" : "straight shot";
                const shotDesc = `${contactLabel}. A ${trajectoryLabel} ${shapeLabel}.`;
                const windDesc = `Wind pushed it ${Math.abs(windYEffect)} yds ${windYEffect > 0 ? 'long' : windYEffect < 0 ? 'short' : 'nowhere'}, and ${Math.abs(windXEffect)} yds ${windXEffect > 0 ? 'right' : windXEffect < 0 ? 'left' : 'nowhere'}.`;

                // 4. The Reveal
                setTimeout(() => {
                    let dirStr = lateralX === 0 ? "dead straight" : `${Math.abs(lateralX)} yards ${lateralX < 0 ? 'left' : 'right'}`;
                    const sideSpinShape = sideSpinRPM === 0 ? "Straight" : sideSpinRPM > 0 ? "Slice" : "Hook";
                    const metrics = `Power ${finalPower}%. Hinge Diff ${hingeDiff}ms. Impact Offset ${impactDiff}ms. Accuracy Score ${accuracyScore}%. Backspin: ${backspinRPM} RPM. Side Spin: ${sideSpinRPM} RPM (${sideSpinShape}).`;
                    const shotBroadcast = `${club.name}. ${shotDesc} ${windDesc} Carries ${carryDistance}, rolls ${rollDistance} for a total of ${totalDistance}. Settles in the ${lie}, ${dirStr}.`;

                    if (gameMode === 'course' && distanceToPin <= 20) {
                        isHoleComplete = true;
                    }

                    if (isHoleComplete) {
                        playTone(440, 'sine', 0.2, 0.4);
                        setTimeout(() => playTone(554, 'sine', 0.2, 0.4), 200);
                        setTimeout(() => playTone(659, 'sine', 0.4, 0.4), 400);
                        const completionMessage = `Hole complete! You reached the green in ${strokes} strokes.`;
                        window.announce(completionMessage);
                        lastShotReport = completionMessage + "\n\n" + shotBroadcast + "\n\nTelemetry:\n" + metrics;
                        document.getElementById('visual-output').innerText = lastShotReport;
                        swingState = 6;
                    } else {
                        const broadcast = gameMode === 'course'
                            ? `Stroke ${strokes + 1}. ${distanceToPin} yards to the pin. ${shotBroadcast}`
                            : `Driving Range. ${shotBroadcast}`;
                        window.announce(broadcast);
                        lastShotReport = broadcast + "\n\nTelemetry:\n" + metrics;
                        document.getElementById('visual-output').innerText = lastShotReport;

                        generateWind();
                        aimAngle = 0;
                        stanceIndex = 2;
                        stanceAlignment = 0;
                        swingState = 0; // Reset for next shot
                    }
                }, bounceSequenceMs + (rollTimeSecs * 1000) + 500);

            }, hangTimeSecs * 1000);
        }

        window.addEventListener('keydown', (e) => {
            if (confirmingRange) {
                if (e.code === 'KeyY' || e.code === 'Enter') {
                    e.preventDefault();
                    gameMode = 'range'; confirmingRange = false; strokes = 0; distanceToPin = Infinity; isHoleComplete = false; swingState = 0;
                    window.announce("Welcome to the Driving Range. Unlimited practice.");
                    document.getElementById('visual-output').innerText = "Driving Range. Ready.";
                } else {
                    confirmingRange = false; window.announce("Range travel cancelled.");
                }
                return;
            }

            if (swingState === 0 || isHoleComplete) {
                if (e.code === 'KeyR') {
                    e.preventDefault();
                    confirmingRange = true;
                    window.announce("Go to Driving Range? Press Y or Enter to confirm.");
                    return;
                }
                if (e.code.startsWith('Digit') && e.code !== 'Digit0') {
                    e.preventDefault();
                    let targetHole = parseInt(e.code.replace('Digit', ''));
                    if (e.shiftKey) targetHole += 9;

                    gameMode = 'course'; hole = targetHole; par = 4; distanceToPin = 420; strokes = 0; isHoleComplete = false; swingState = 0;
                    aimAngle = 0; stanceIndex = 2; stanceAlignment = 0; confirmingRange = false;
                    let msg = `Warping to Hole ${hole}. Par ${par}. ${distanceToPin} yards.`;
                    window.announce(msg);
                    document.getElementById('visual-output').innerText = msg;
                    return;
                }
            }

            if (isHoleComplete) return;
            if (e.repeat) return;

            // Prevent input if ball is in the air (State 5)
            if (swingState === 5) return;

            if (e.code === 'ArrowDown') {
                e.preventDefault();
                if (swingState === 0) startBackswing();
                else if (swingState === 4) calculateShot(false);
            }

            if (e.code === 'Space') {
                e.preventDefault();
                playTone(880, 'sine', 0.1, 0.25);
                if (swingState === 1) hingeTimeBack = performance.now() - backswingStartTime;
                if (swingState === 3) hingeTimeDown = performance.now() - downswingStartTime;
            }

            if (swingState === 0) {
                if (e.code === 'Home' || e.code === 'End') {
                    e.preventDefault();
                    if (e.code === 'Home') {
                        stanceIndex = Math.max(0, stanceIndex - 1);
                    }
                    if (e.code === 'End') {
                        stanceIndex = Math.min(4, stanceIndex + 1);
                    }
                    const stanceReport = getStanceReport();
                    document.getElementById('visual-output').innerText = stanceReport;
                    window.announce(stanceReport);
                }
                if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        stanceAlignment += e.code === 'ArrowLeft' ? -1 : 1;
                        stanceAlignment = Math.max(-2, Math.min(2, stanceAlignment));
                        const stanceReport = getStanceReport();
                        document.getElementById('visual-output').innerText = stanceReport;
                        window.announce(stanceReport);
                    } else {
                        aimAngle += e.code === 'ArrowLeft' ? -1 : 1;
                        aimAngle = Math.max(-90, Math.min(90, aimAngle));
                        const aimReport = getAimReport();
                        document.getElementById('visual-output').innerText = aimReport;
                        window.announce(aimReport);
                    }
                }
                if (e.code === 'KeyW') {
                    e.preventDefault();
                    const windReport = getWindReport();
                    document.getElementById('visual-output').innerText = windReport;
                    window.announce(windReport);
                }
                if (e.code === 'KeyC') {
                    e.preventDefault();
                    document.getElementById('visual-output').innerText = lastShotReport;
                    window.announce(lastShotReport);
                }
                if (e.code === 'PageUp') {
                    e.preventDefault();
                    if (currentClubIndex > 0) {
                        currentClubIndex--; club = clubs[currentClubIndex];
                        window.announce(`${club.name}. ${club.baseDistance} yards.`);
                        document.getElementById('visual-output').innerText = `Club: ${club.name}\nBase: ${club.baseDistance} yards`;
                    }
                }
                if (e.code === 'PageDown') {
                    e.preventDefault();
                    if (currentClubIndex < clubs.length - 1) {
                        currentClubIndex++; club = clubs[currentClubIndex];
                        window.announce(`${club.name}. ${club.baseDistance} yards.`);
                        document.getElementById('visual-output').innerText = `Club: ${club.name}\nBase: ${club.baseDistance} yards`;
                    }
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown' && (swingState === 1 || swingState === 2)) {
                e.preventDefault(); startDownswing();
            }
        });
    </script>
</body>
</html>
